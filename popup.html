<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>EasyChat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1e1e1e; --surface2: #252525;
      --border: #2e2e2e; --accent: #10a37f; --accent-hover: #0d8f6f;
      --text: #ececec; --text-muted: #888;
    }
    body {
      width: 360px; background: var(--bg); color: var(--text);
      font-family: -apple-system,'Segoe UI',sans-serif; font-size: 13px;
      overflow: hidden; position: relative;
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
      background: #161616; gap: 6px;
    }
    .logo { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; flex: 1; }
    .logo-icon { color: var(--accent); }
    .header-btns { display: flex; gap: 4px; }
    .hdr-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: 11px; white-space: nowrap;
    }
    .hdr-btn:hover { background: var(--surface2); color: var(--text); }

    /* Session drawer */
    .session-drawer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); z-index: 50; display: flex; flex-direction: column;
      transform: translateX(-100%); transition: transform .2s ease;
    }
    .session-drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-bottom: 1px solid var(--border); background: #161616;
    }
    .drawer-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .drawer-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; }
    .drawer-close:hover { color: var(--text); }
    .session-list { flex: 1; overflow-y: auto; padding: 6px; }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .session-item {
      padding: 8px 10px; border-radius: 7px; cursor: pointer; font-size: 12px;
      color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .session-item:hover { background: var(--surface2); color: var(--text); }
    .session-item.active { background: var(--surface); color: var(--text); }

    /* Quick chat */
    .quick-chat { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
    .section-title {
      padding: 5px 12px 2px; font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .6px;
    }
    .messages-area {
      height: 180px; overflow-y: auto; padding: 6px 10px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .msg { display: flex; gap: 7px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble {
      padding: 6px 10px; border-radius: 12px; font-size: 12px;
      line-height: 1.6; max-width: 240px; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
      border-radius: 12px 12px 3px 12px;
    }
    .msg.ai .msg-bubble {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 3px 12px 12px 12px;
    }
    .msg.ai .msg-bubble.md { white-space: normal; }
    .msg.ai .msg-bubble.md p { margin: 4px 0; }
    .msg.ai .msg-bubble.md code {
      background: #1a1a2e; border: 1px solid #2e2e4e; border-radius: 3px;
      padding: 1px 5px; font-size: 11px; color: #c792ea;
    }
    .msg.ai .msg-bubble.md pre { background: #0d0d14; border-radius: 6px; padding: 8px 10px; overflow-x: auto; margin: 6px 0; }
    .msg.ai .msg-bubble.md pre code { background: none; border: none; padding: 0; color: #abb2bf; }
    .msg.ai .msg-bubble.md ul, .msg.ai .msg-bubble.md ol { padding-left: 16px; margin: 4px 0; }
    .msg.ai .msg-bubble.md strong { color: #e8e8e8; }

    .msg-avatar {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 12px;
      background: var(--surface2); border: 1px solid var(--border); margin-top: 2px;
    }
    .msg-avatar.ai { background: linear-gradient(135deg,#10a37f,#0d8f6f); border-color: #10a37f; }
    .msg-avatar.user { background: linear-gradient(135deg,#667eea,#764ba2); border-color: #667eea; }

    .empty-hint {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 12px; text-align: center; line-height: 1.8;
    }
    .msg-img { max-width: 180px; max-height: 120px; border-radius: 8px; display: block; margin-top: 4px; }

    .typing-dots { display: flex; gap: 3px; align-items: center; padding: 4px 0; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: blink 1.3s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* Input */
    .input-row {
      display: flex; align-items: flex-end; gap: 6px;
      padding: 6px 8px; border-top: 1px solid var(--border); background: var(--bg);
    }
    .screenshot-preview-wrap { padding: 4px 8px 0; }
    .screenshot-preview { position: relative; display: inline-block; }
    .screenshot-preview img { max-height: 56px; border-radius: 6px; border: 1px solid var(--border); display: block; }
    .remove-preview {
      position: absolute; top: -4px; right: -4px; background: #333; border: none;
      color: #fff; border-radius: 50%; width: 15px; height: 15px; font-size: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* Context attachment tag (code explain / summarize) */
    .context-tags-wrap { padding: 4px 8px 0; display: flex; flex-wrap: wrap; gap: 4px; }
    .context-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 20px; padding: 2px 8px 2px 6px; font-size: 11px; color: var(--accent);
    }
    .context-tag-remove {
      background: none; border: none; color: var(--accent); cursor: pointer;
      font-size: 13px; line-height: 1; padding: 0; margin-left: 2px; opacity: .7;
    }
    .context-tag-remove:hover { opacity: 1; }
    #quickInput {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12px; outline: none;
      padding: 6px 9px; resize: none; max-height: 80px; line-height: 1.5; font-family: inherit;
    }
    #quickInput:focus { border-color: var(--accent); }
    #quickInput::placeholder { color: var(--text-muted); }
    .input-tool-btn {
      background: none; border: none; font-size: 15px; cursor: pointer;
      padding: 2px; opacity: .55; flex-shrink: 0; line-height: 1;
      color: var(--text-muted);
      transition: opacity .15s, transform .1s;
    }
    .input-tool-btn:hover { opacity: 1; transform: scale(1.15); color: var(--text); }
    .input-tool-btn.active { opacity: 1; color: var(--accent); filter: drop-shadow(0 0 4px var(--accent)); }
    .send-btn {
      background: var(--accent); border: none; border-radius: 7px; color: #fff;
      width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background .15s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { background: var(--surface2); cursor: not-allowed; }
    .stop-btn {
      background: #c0392b; border: none; border-radius: 7px; color: #fff;
      width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* Tool buttons */
    .tools { padding: 4px 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .tool-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 10px; border-radius: 7px; cursor: pointer;
      background: none; border: 1px solid transparent; color: var(--text);
      font-size: 12px; text-align: left; width: 100%; transition: all .15s;
    }
    .tool-btn:hover { background: var(--surface); border-color: var(--border); }
    .tool-btn:active { background: var(--surface2); }
    .tool-icon { font-size: 13px; flex-shrink: 0; }
    .tool-name { font-size: 12px; font-weight: 500; }
    .tool-btn.loading { opacity: .6; pointer-events: none; }

    /* Status bar */
    .status-bar {
      padding: 4px 12px; font-size: 10px; color: #555;
      border-top: 1px solid var(--border); background: #0a0a0a;
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #e55; flex-shrink: 0; }
    .status-dot.ok { background: var(--accent); }

    .toast {
      position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 4px 12px; border-radius: 14px;
      font-size: 11px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Session history drawer -->
<div class="session-drawer" id="sessionDrawer">
  <div class="drawer-header">
    <span class="drawer-title">对话历史</span>
    <button class="drawer-close" id="drawerClose">×</button>
  </div>
  <div class="session-list" id="sessionList"></div>
</div>

<div class="header">
  <div class="logo"><span class="logo-icon">✦</span>EasyChat</div>
  <div class="header-btns">
    <select id="langSelect" style="background:var(--surface);border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:3px 6px;font-size:11px;cursor:pointer;outline:none;">
      <option value="zh">中文</option>
      <option value="en">EN</option>
    </select>
    <button class="hdr-btn" id="historyBtn">历史 ☰</button>
    <button class="hdr-btn" id="openSidebarBtn">侧边栏 ▕</button>
    <button class="hdr-btn" id="openFullBtn">完整界面 ↗</button>
  </div>
</div>

<div class="quick-chat">
  <div class="section-title">快速对话</div>
  <div class="messages-area" id="messagesArea">
    <div class="empty-hint" id="emptyHint">选中文字后点工具按钮<br>或直接在这里输入</div>
  </div>
  <div class="screenshot-preview-wrap" id="screenshotPreviewWrap" style="display:none;">
    <div class="screenshot-preview">
      <img id="screenshotPreviewImg" src="" alt="" />
      <button class="remove-preview" id="removeScreenshot">×</button>
    </div>
  </div>
  <div class="context-tags-wrap" id="contextTagsWrap" style="display:none;"></div>
  <div class="input-row">
    <button class="input-tool-btn" id="btnNewChat" title="新对话">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="input-tool-btn" id="btnWebSearch" title="联网搜索">🌐</button>
    <textarea id="quickInput" placeholder="发送消息..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
    <button class="stop-btn" id="stopBtn" style="display:none;">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
  </div>
</div>

<div class="tools">
  <button class="tool-btn" id="btnScreenshot"><span class="tool-icon">📷</span><span class="tool-name">截图对话</span></button>
  <button class="tool-btn" id="btnExplainCode"><span class="tool-icon">💻</span><span class="tool-name">代码解释</span></button>
  <button class="tool-btn" id="btnRewrite"><span class="tool-icon">✏️</span><span class="tool-name">改写/翻译</span></button>
  <button class="tool-btn" id="btnSummarize"><span class="tool-icon">📄</span><span class="tool-name">总结网页</span></button>
  <button class="tool-btn" id="btnAnnotate"><span class="tool-icon">📌</span><span class="tool-name">自动标注</span></button>
</div>

<div class="status-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">未配置 API Key</span>
</div>

<div class="toast" id="toast"></div>

<script src="marked.min.js"></script>
<script src="shared-core.js"></script>
<script src="popup.js"></script>
</body>
</html>
